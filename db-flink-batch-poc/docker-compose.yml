x-flink-env: &flink-env
  SOURCE_DB_URL: jdbc:postgresql://postgres:5432/salesdb
  SOURCE_DB_USER: poc
  SOURCE_DB_PASS: poc123
  SINK_DB_URL: jdbc:postgresql://postgres:5432/salesdb
  SINK_DB_USER: poc
  SINK_DB_PASS: poc123
  # Date filter passed to the Flink job as --from / --to (yyyy-MM-dd).
  # Override at runtime: JOB_FROM_DATE=2024-02-01 JOB_TO_DATE=2024-02-29 docker compose up
  JOB_FROM_DATE: "2024-02-01"
  JOB_TO_DATE: "2024-02-29"
  OPENLINEAGE_URL: "http://marquez:5000"
  OPENLINEAGE_NAMESPACE: "kata_data"
  OPENLINEAGE_TRANSPORT_TYPE: "http"
  # Se o seu JAR for 1.18+, adicione:
  OPENLINEAGE_ENDPOINT: "/api/v1/lineage"
  OPENLINEAGE_JOBNAME: "SalesRankingsBatchJob"

services:
    # 1. Adicione o Marquez para visualizar a linhagem
  marquez:
    image: marquezproject/marquez:0.50.0
    container_name: marquez
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - MARQUEZ_DB_HOST=postgres
      - MARQUEZ_DB_PORT=5432
      - MARQUEZ_DB_NAME=marquez
      - MARQUEZ_DB_USER=marquez
      - MARQUEZ_DB_PASSWORD=marquez
      # Força a ativação da interface gráfica
      - MARQUEZ_UI_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
  marquez-ui:
    image: marquezproject/marquez-web:0.50.0
    container_name: marquez-ui
    ports:
      - "3000:3000"
    environment:
      - MARQUEZ_API_URL=http://marquez:5000
      - MARQUEZ_HOST=marquez
      - MARQUEZ_PORT=5000
      - WEB_PORT=3000
    depends_on:
      - marquez
  # Database (source + sink — same instance, different tables)
  postgres:
    image: postgres:14
    container_name: postgres
    networks:
      default:
        aliases:
          - postgres_db
          - localhost
    environment:
      POSTGRES_USER: poc
      POSTGRES_PASSWORD: poc123
      POSTGRES_DB: salesdb
    ports:
      - "5434:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poc -d salesdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Flink Cluster
  flink-jobmanager:
    image: flink:2.2.0-java11
    command: jobmanager
    container_name: flink-jobmanager
    ports:
      - "8084:8081"
    volumes:
      # Certifique-se de colocar o JAR do openlineage na pasta lib
      - ./lib/openlineage-flink-1.45.0.jar:/opt/flink/lib/openlineage-flink.jar
      - ./openlineage.yml:/opt/flink/openlineage.yml
    environment:
      OPENLINEAGE_CONFIG: /opt/flink/openlineage.yml
      OPENLINEAGE_URL: http://marquez:5000/api/v1/lineage
      OPENLINEAGE_NAMESPACE: kata_data
      <<: *flink-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        rest.bind-port: 8081
        execution.job-listeners: io.openlineage.flink.OpenLineageJobListener
        classloader.resolve-order: parent-first
        OPENLINEAGE_CONFIG: /opt/flink/openlineage.yml
        # Força o transporte diretamente via Env Var para o Agente não ter desculpa

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 10s
      retries: 10

  flink-taskmanager:
    image: flink:2.2.0-java11
    command: taskmanager
    container_name: flink-taskmanager
    volumes:
      # O TaskManager também precisa do JAR para serialização dos eventos
      - ./lib/openlineage-flink-1.45.0.jar:/opt/flink/lib/openlineage-flink.jar
      - ./openlineage.yml:/opt/flink/openlineage.yml
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      <<: *flink-env
      OPENLINEAGE_CONFIG: /opt/flink/openlineage.yml
      OPENLINEAGE_URL: http://marquez:5000/api/v1/lineage
      OPENLINEAGE_NAMESPACE: kata_data
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4

  # Builds the fat JAR, submits to the Flink cluster, and waits for completion
  # Note: no -d flag — batch jobs run to completion and exit cleanly
  flink-job-submit:
    build: ./flink-job
    volumes:
      - ./lib/openlineage-flink-1.45.0.jar:/opt/flink/lib/openlineage-flink.jar
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      flink-taskmanager:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      <<: *flink-env
    entrypoint: ["/bin/sh", "-c"]
    command: ["echo 'Submitting batch job...' && flink run -m flink-jobmanager:8081 \
    -c com.poc.BatchJob /opt/flink/usrlib/flink-job.jar --from $$JOB_FROM_DATE --to $$JOB_TO_DATE && echo 'Batch job completed successfully.'"]

volumes:
  postgres-data:
